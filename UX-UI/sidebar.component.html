<!-- ═══════════════════════════════════════════
     PROCOMP — Sidebar Component
     Spec: sidebar-ui-spec.html v1.0
     ═══════════════════════════════════════════ -->

<!-- ── Mobile overlay ── -->
<div
  class="sidebar-overlay"
  [class.visible]="mobileDrawerOpen"
  (click)="closeMobileDrawer()">
</div>

<!-- ── Mobile top bar (< 768px) ── -->
<header class="mobile-header">
  <div class="mobile-header-left">
    <button class="hamburger-btn" (click)="openMobileDrawer()" aria-label="Apri menu">
      <mat-icon>menu</mat-icon>
    </button>
    <!-- Logo mobile -->
    <svg class="logo-svg" viewBox="0 0 120 32" height="20" aria-label="PROCOMP">
      <text x="0" y="26" font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="30" font-weight="200" fill="#2C3E7A">P</text>
      <text x="18" y="26" font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="30" font-weight="200" fill="#BDBDBD">ROCOMP</text>
    </svg>
  </div>
  <div class="mobile-header-right">
    <button mat-icon-button class="notif-btn" aria-label="Notifiche">
      <mat-icon [matBadge]="notificationCount > 0 ? notificationCount : null"
                matBadgeColor="warn">notifications</mat-icon>
    </button>
    <div class="user-avatar avatar-sm">{{ userInitials }}</div>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     SIDEBAR (desktop + mobile drawer)
     ═══════════════════════════════════════════ -->
<nav
  class="sidebar"
  [class.collapsed]="collapsed"
  [class.drawer-open]="mobileDrawerOpen"
  aria-label="Navigazione principale">

  <!-- ── ZONA A: Logo + Toggle ── -->
  <div class="sidebar-logo">
    <!-- Logo espanso -->
    <svg *ngIf="!collapsed" class="logo-svg" viewBox="0 0 180 44" height="22" aria-label="PROCOMP GRC">
      <text x="4" y="34" font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="36" font-weight="200" fill="#2C3E7A">P</text>
      <text x="24" y="34" font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="36" font-weight="200" fill="#BDBDBD">ROCOMP</text>
      <rect x="162" y="10" width="8" height="8" rx="1" fill="#2C3E7A"/>
    </svg>
    <!-- Logo collassato: solo "P" -->
    <svg *ngIf="collapsed" class="logo-svg" viewBox="0 0 36 40" height="22" aria-label="PROCOMP">
      <text x="4" y="32" font-family="'Helvetica Neue', Arial, sans-serif"
            font-size="36" font-weight="200" fill="#2C3E7A">P</text>
    </svg>

    <!-- Toggle button -->
    <button
      class="toggle-btn"
      (click)="toggleCollapse()"
      [attr.aria-label]="collapsed ? 'Espandi sidebar' : 'Comprimi sidebar'">
      <mat-icon>{{ collapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
    </button>

    <!-- Close button (solo mobile drawer) -->
    <button
      class="close-drawer-btn"
      (click)="closeMobileDrawer()"
      aria-label="Chiudi menu">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- ── ZONA C: Menu principale (scrollabile) ── -->
  <div class="sidebar-menu">

    <ng-container *ngFor="let item of navItems">

      <!-- Item senza figli (root leaf) -->
      <ng-container *ngIf="!item.children">
        <a
          class="menu-item"
          [class.selected]="isActive(item.route)"
          [routerLink]="item.route"
          [matTooltip]="tooltipText(item)"
          matTooltipPosition="right"
          [attr.aria-current]="isActive(item.route) ? 'page' : null">
          <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
          <span class="menu-label">{{ item.label }}</span>
        </a>
      </ng-container>

      <!-- Gruppo con sottomenu -->
      <ng-container *ngIf="item.children">
        <!-- Titolo gruppo -->
        <div
          class="menu-group-title"
          [class.open]="isGroupExpanded(item.label)"
          [class.group-active]="isGroupActive(item)"
          (click)="toggleGroup(item.label)"
          [matTooltip]="tooltipText(item)"
          matTooltipPosition="right"
          role="button"
          [attr.aria-expanded]="isGroupExpanded(item.label)">
          <div class="menu-group-left">
            <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
            <span class="menu-label">{{ item.label }}</span>
          </div>
          <mat-icon class="chevron">expand_more</mat-icon>
        </div>

        <!-- Figli (animati) -->
        <div
          class="menu-group-children"
          [class.expanded]="isGroupExpanded(item.label) && !collapsed">
          <a
            *ngFor="let child of item.children"
            class="menu-item child"
            [class.selected]="isActive(child.route)"
            [routerLink]="child.route"
            [attr.aria-current]="isActive(child.route) ? 'page' : null">
            <mat-icon class="menu-icon">{{ child.icon }}</mat-icon>
            <span class="menu-label">{{ child.label }}</span>
          </a>
        </div>
      </ng-container>

    </ng-container>

  </div><!-- /sidebar-menu -->

  <!-- ── ZONA D: Utente ── -->
  <div class="sidebar-user">
    <button
      class="user-button"
      [matTooltip]="collapsed ? userName : ''"
      matTooltipPosition="right"
      (click)="logout()"
      aria-label="Menu utente">
      <div class="user-avatar">{{ userInitials }}</div>
      <span class="user-name">{{ userName }}</span>
    </button>
  </div>

</nav>
